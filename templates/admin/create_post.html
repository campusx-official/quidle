{% extends "base.html" %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
{% endblock %}
{% block content %}
<div class="write-container">
    {% if error %}
        <p class="auth-error write-error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/admin/posts/new">
        <div class="write-meta-bar">
            <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Dashboard</a>
            <div class="write-actions">
                <select name="status" class="write-status-select">
                    <option value="draft"
                        {% if form.get('status', 'draft') == 'draft' %}selected{% endif %}>
                        Draft
                    </option>
                    <option value="published"
                        {% if form.get('status') == 'published' %}selected{% endif %}>
                        Published
                    </option>
                </select>
                <button type="submit" class="btn-save">Save Post</button>
            </div>
        </div>

        <input  type="text"
                name="title"
                class="write-title-input"
                placeholder="Post title…"
                value="{{ form.get('title', '') }}"
                autofocus>

        <textarea name="excerpt"
                  class="write-excerpt-input"
                  rows="2"
                  placeholder="A short excerpt or subtitle…">{{ form.get('excerpt', '') }}</textarea>

        <label class="write-content-label" for="quill-editor">Content</label>
        <div id="quill-editor" class="write-content-input"></div>
        <input type="hidden" name="content" id="content-hidden">
    </form>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script>
  const quill = new Quill('#quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ header: [1, 2, false] }],
        ['bold', 'italic', 'underline'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote', 'link'],
        ['clean']
      ]
    }
  });

  {% if form.get('content') %}
  quill.root.innerHTML = {{ form.get('content') | tojson }};
  {% endif %}

  const postForm = document.querySelector('form');
  postForm.addEventListener('submit', function () {
    const html = quill.root.innerHTML;
    const text = quill.getText().trim();
    document.getElementById('content-hidden').value = text ? html : '';
  });
</script>
{% endblock %}
